name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Swift Tests
    runs-on: depot-ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      # Cache dependency sources only — NOT the full `.build` tree. Restoring debug/index-build/
      # manifest JSON / llbuild records from Actions cache often yields truncated files ("Corrupted
      # JSON", "unexpected end of file") after interrupted jobs or cross-run races.
      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build/checkouts
            .build/repositories
            .build/artifacts
          key: ${{ runner.os }}-spm-deps-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-deps-
      - name: Swift Toolchain Cache Key
        id: swiftkey
        run: |
          . /etc/os-release
          echo "ubuntu=${VERSION_ID:-unknown}" >> "$GITHUB_OUTPUT"
          echo "arch=$(uname -m)" >> "$GITHUB_OUTPUT"
      - name: Cache Swift Toolchain Tarball
        uses: actions/cache@v4
        with:
          path: .ci-cache/swift-toolchain.tgz
          key: swift-tarball-6.2.4-${{ steps.swiftkey.outputs.ubuntu }}-${{ steps.swiftkey.outputs.arch }}
      # Install Swift from swift.org (same generation as Dockerfile swift:6.2-jammy). On Depot CI,
      # setup-swift can leave an older host Swift on PATH; that compiler does not understand visionOS
      # in availability metadata from dependencies (e.g. Yams), which triggers fatal errors on Linux.
      - name: Install Swift 6.2
        run: |
          set -euxo pipefail
          sudo apt-get update
          . /etc/os-release
          sudo apt-get install -y \
            binutils \
            clang \
            curl \
            ca-certificates \
            git \
            gnupg2 \
            libc6-dev \
            libcurl4-openssl-dev \
            libedit2 \
            libicu-dev \
            libncurses-dev \
            libsqlite3-0 \
            libxml2-dev \
            pkg-config \
            tzdata \
            unzip \
            zip \
            zlib1g-dev
          case "${VERSION_ID:-}" in
            24.04)
              sudo apt-get install -y \
                libgcc-13-dev \
                libpython3-dev \
                libstdc++-13-dev \
                libz3-dev
              ;;
            *)
              sudo apt-get install -y \
                libgcc-11-dev \
                libpython3-dev \
                libstdc++-11-dev \
                libz3-dev \
                python3-lldb-13
              ;;
          esac
          SWIFT_VER=6.2.4
          case "${VERSION_ID:-}" in
            24.04) SWIFT_UBUNTU=ubuntu24.04; SWIFT_DL=ubuntu2404 ;;
            22.04) SWIFT_UBUNTU=ubuntu22.04; SWIFT_DL=ubuntu2204 ;;
            *) SWIFT_UBUNTU=ubuntu22.04; SWIFT_DL=ubuntu2204 ;;
          esac
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64) ;;
            aarch64|arm64) SWIFT_DL="${SWIFT_DL}-aarch64"; SWIFT_UBUNTU="${SWIFT_UBUNTU}-aarch64" ;;
            *) echo "unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          SWIFT_ROOT="swift-${SWIFT_VER}-RELEASE-${SWIFT_UBUNTU}"
          URL="https://download.swift.org/swift-${SWIFT_VER}-release/${SWIFT_DL}/swift-${SWIFT_VER}-RELEASE/${SWIFT_ROOT}.tar.gz"
          mkdir -p .ci-cache
          SWIFT_TAR=".ci-cache/swift-toolchain.tgz"
          if [ ! -s "$SWIFT_TAR" ]; then
            curl -fsSL "$URL" -o "$SWIFT_TAR"
          fi
          sudo tar -xzf "$SWIFT_TAR" -C /opt
          echo "/opt/${SWIFT_ROOT}/usr/bin" >> "${GITHUB_PATH}"
          swift --version
      # Single `swift test` (no split) — see swiftlang/swift-package-manager#9441: a *second*
      # SwiftPM invocation (`swift test --skip-build` after `swift build`) can hang at "Planning
      # build" on Linux/KVM with Swift 6.1+ (no CPU). Fix upstream: SwiftPM PR #9493 in 6.3-dev+.
      #
      # Swift 6.2.x can still hang on the *first* planning pass if llbuild/plan state under `.build`
      # is bad. We therefore: clean + scrub `index-build` / `build.db` before `swift test`, avoid
      # extra manifest-cache flags that can interact badly, use `-v` for progress, and emit a
      # heartbeat line every 60s so "silent" stalls are visible in logs.
      #
      # `swift package clean` before + after resolve/patch; we only cache checkouts/repositories/
      # artifacts (see "Cache SwiftPM dependencies" above).
      #
      # Vapor's VaporTesting target imports `Testing` but does not declare a swift-testing package
      # dependency; Linux OSS toolchains then miss `_TestingInternals`. Patch Vapor's checkout
      # after resolve (see scripts/patch-vapor-swift-testing.py and vapor/vapor#3391).
      # Patch is inlined below so CI works even if scripts/ was not committed on a branch.
      - name: Build and Run Tests
        id: run_tests
        env:
          # Prevent inherited runner/org secrets from forcing Postgres during `swift test` (hang risk on autoMigrate).
          DATABASE_URL: ""
          SUPABASE_DB_URL: ""
        run: |
          set -euxo pipefail
          mkdir -p .build/ci-logs
          swift --version | tee .build/ci-logs/swift-version.txt
          uname -a | tee .build/ci-logs/uname.txt
          ulimit -a 2>&1 | tee .build/ci-logs/ulimit.txt || true
          # Drop any stale build graph / incremental state (do not rely on cached llbuild JSON).
          swift package clean
          swift package resolve
          python3 <<'PATCH_VAPOR_EOF'
          import os
          import sys
          from pathlib import Path
          pkg = Path(".build/checkouts/vapor/Package.swift")
          if not pkg.is_file():
              print("error: missing Vapor checkout (run swift package resolve first)", file=sys.stderr)
              sys.exit(1)
          text = pkg.read_text(encoding="utf-8")
          if "github.com/apple/swift-testing.git" in text:
              print("Vapor Package.swift already references swift-testing; skipping patch.")
              raise SystemExit(0)
          dep = '.package(url: "https://github.com/apple/swift-asn1.git", from: "1.0.0")'
          if dep not in text:
              print("error: unexpected Vapor Package.swift (swift-asn1 line)", file=sys.stderr)
              sys.exit(1)
          text = text.replace(dep, dep + ',\n        .package(url: "https://github.com/apple/swift-testing.git", from: "6.2.0")', 1)
          old = (
              '        .target(\n'
              '            name: "VaporTesting",\n'
              '            dependencies: [\n'
              '                .target(name: "VaporTestUtils"),\n'
              '                .target(name: "Vapor"),\n'
              '            ],\n'
              '            swiftSettings: swiftSettings\n'
              '        ),'
          )
          new = (
              '        .target(\n'
              '            name: "VaporTesting",\n'
              '            dependencies: [\n'
              '                .product(name: "Testing", package: "swift-testing"),\n'
              '                .target(name: "VaporTestUtils"),\n'
              '                .target(name: "Vapor"),\n'
              '            ],\n'
              '            swiftSettings: swiftSettings\n'
              '        ),'
          )
          if old not in text:
              print("error: unexpected Vapor Package.swift (VaporTesting target)", file=sys.stderr)
              sys.exit(1)
          text = text.replace(old, new, 1)
          try:
              os.chmod(pkg, 0o644)
          except OSError:
              pass
          pkg.write_text(text, encoding="utf-8")
          print("Patched Vapor Package.swift: VaporTesting -> swift-testing.")
          PATCH_VAPOR_EOF
          swift package clean
          echo "Running swift test (after clean; single invocation; avoids incremental Planning build hang on Linux)..."
          # AppTests use Swift Testing only. `--disable-xctest` turns off the XCTest *runner* (no
          # empty XCTest harness / xunit quirks). SwiftPM still *names* the bundle
          # `MyContextProtocolPackageTests.xctest` — that is the normal test bundle filename on
          # Linux/macOS, not proof that XCTest.framework is linked.
          # Prefer Swift Testing explicitly; skip xUnit XML here (re-enable with an absolute path if needed).
          # Scrub planner state that `swift package clean` can leave behind on Linux (#9441).
          rm -rf .build/index-build 2>/dev/null || true
          find .build -name build.db -delete 2>/dev/null || true
          (
            while true; do
              date -u +"[ci-heartbeat] %Y-%m-%dT%H:%M:%SZ swift test still running..."
              sleep 60
            done
          ) &
          _HEARTBEAT_PID=$!
          # Do not use `trap ... EXIT` to kill the heartbeat: under `set -e`, a failed `kill` (e.g.
          # race with exiting subshell) can override swift test's exit code. Capture PIPESTATUS and
          # stop the heartbeat explicitly instead.
          set +e
          stdbuf -oL -eL env \
            SWIFT_BACKTRACE=enable \
            LOG_LEVEL=info \
            swift test --no-color-diagnostics --skip-update \
            -v \
            --enable-swift-testing --disable-xctest \
            --no-parallel \
            -Xswiftc -warnings-as-errors \
            2>&1 | stdbuf -oL tee .build/ci-logs/swift-test-console.log
          _SWIFT_TEST_EXIT="${PIPESTATUS[0]}"
          kill "${_HEARTBEAT_PID}" 2>/dev/null || true
          wait "${_HEARTBEAT_PID}" 2>/dev/null || true
          exit "${_SWIFT_TEST_EXIT}"
      - name: Re-run Tests Sequentially (Diagnostics)
        if: failure() && steps.run_tests.outcome == 'failure'
        env:
          DATABASE_URL: ""
          SUPABASE_DB_URL: ""
        run: |
          set -euxo pipefail
          mkdir -p .build/ci-logs
          echo "Re-running swift test with --no-parallel -vv after purge/reset (avoids incremental Planning hang)..."
          swift package purge-cache
          swift package reset
          swift package resolve
          python3 <<'PATCH_VAPOR_EOF'
          import os
          import sys
          from pathlib import Path
          pkg = Path(".build/checkouts/vapor/Package.swift")
          if not pkg.is_file():
              print("error: missing Vapor checkout (run swift package resolve first)", file=sys.stderr)
              sys.exit(1)
          text = pkg.read_text(encoding="utf-8")
          if "github.com/apple/swift-testing.git" in text:
              print("Vapor Package.swift already references swift-testing; skipping patch.")
              raise SystemExit(0)
          dep = '.package(url: "https://github.com/apple/swift-asn1.git", from: "1.0.0")'
          if dep not in text:
              print("error: unexpected Vapor Package.swift (swift-asn1 line)", file=sys.stderr)
              sys.exit(1)
          text = text.replace(dep, dep + ',\n        .package(url: "https://github.com/apple/swift-testing.git", from: "6.2.0")', 1)
          old = (
              '        .target(\n'
              '            name: "VaporTesting",\n'
              '            dependencies: [\n'
              '                .target(name: "VaporTestUtils"),\n'
              '                .target(name: "Vapor"),\n'
              '            ],\n'
              '            swiftSettings: swiftSettings\n'
              '        ),'
          )
          new = (
              '        .target(\n'
              '            name: "VaporTesting",\n'
              '            dependencies: [\n'
              '                .product(name: "Testing", package: "swift-testing"),\n'
              '                .target(name: "VaporTestUtils"),\n'
              '                .target(name: "Vapor"),\n'
              '            ],\n'
              '            swiftSettings: swiftSettings\n'
              '        ),'
          )
          if old not in text:
              print("error: unexpected Vapor Package.swift (VaporTesting target)", file=sys.stderr)
              sys.exit(1)
          text = text.replace(old, new, 1)
          try:
              os.chmod(pkg, 0o644)
          except OSError:
              pass
          pkg.write_text(text, encoding="utf-8")
          print("Patched Vapor Package.swift: VaporTesting -> swift-testing.")
          PATCH_VAPOR_EOF
          swift package clean
          rm -rf .build/index-build 2>/dev/null || true
          find .build -name build.db -delete 2>/dev/null || true
          (
            while true; do
              date -u +"[ci-heartbeat] %Y-%m-%dT%H:%M:%SZ swift test rerun still running..."
              sleep 60
            done
          ) &
          _HEARTBEAT_PID=$!
          set +e
          stdbuf -oL -eL env \
            SWIFT_BACKTRACE=enable \
            LOG_LEVEL=debug \
            swift test --no-parallel -vv --no-color-diagnostics --skip-update \
            --enable-swift-testing --disable-xctest \
            -Xswiftc -warnings-as-errors \
            2>&1 | stdbuf -oL tee .build/ci-logs/swift-test-rerun-console.log
          _SWIFT_TEST_EXIT="${PIPESTATUS[0]}"
          kill "${_HEARTBEAT_PID}" 2>/dev/null || true
          wait "${_HEARTBEAT_PID}" 2>/dev/null || true
          exit "${_SWIFT_TEST_EXIT}"
      - name: Upload Swift Test Diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: swift-test-diagnostics
          if-no-files-found: warn
          path: |
            .build/ci-logs/

  docker:
    name: Docker Build and Push
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
    runs-on: depot-ubuntu-latest
    # Depot auth: store the project ID + API token in GitHub repo secrets (values from Depot:
    # Project settings → API / tokens). The remote build runs in your Depot project because of this.
    # Dashboard "environment variables" are NOT auto-injected into `docker build`; pass build-time
    # values with `build-args` / `secrets` on depot/build-push-action if the Dockerfile needs them.
    env:
      DEPOT_PROJECT_ID: ${{ secrets.DEPOT_PROJECT_ID }}
      DEPOT_TOKEN: ${{ secrets.DEPOT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: depot/setup-action@v1
      - name: Set Tag
        id: vars
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "TAG=prod" >> $GITHUB_OUTPUT
          else
            echo "TAG=dev" >> $GITHUB_OUTPUT
          fi
      # `project` + `token` match depot.json / DEPOT_PROJECT_ID + DEPOT_TOKEN (set on job env above).
      - uses: depot/build-push-action@v1
        with:
          context: .
          push: true
          project: ${{ secrets.DEPOT_PROJECT_ID }}
          token: ${{ secrets.DEPOT_TOKEN }}
          tags: |
            stygiantech/my-context-protocol:${{ steps.vars.outputs.TAG }}
            stygiantech/my-context-protocol:sha-${{ github.sha }}
