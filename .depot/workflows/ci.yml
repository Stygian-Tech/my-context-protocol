name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Swift Tests
    runs-on: depot-ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Cache SwiftPM Build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-
      - name: Swift Toolchain Cache Key
        id: swiftkey
        run: |
          . /etc/os-release
          echo "ubuntu=${VERSION_ID:-unknown}" >> "$GITHUB_OUTPUT"
          echo "arch=$(uname -m)" >> "$GITHUB_OUTPUT"
      - name: Cache Swift Toolchain Tarball
        uses: actions/cache@v4
        with:
          path: .ci-cache/swift-toolchain.tgz
          key: swift-tarball-6.2.4-${{ steps.swiftkey.outputs.ubuntu }}-${{ steps.swiftkey.outputs.arch }}
      # Install Swift from swift.org (same generation as Dockerfile swift:6.2-jammy). On Depot CI,
      # setup-swift can leave an older host Swift on PATH; that compiler does not understand visionOS
      # in availability metadata from dependencies (e.g. Yams), which triggers fatal errors on Linux.
      - name: Install Swift 6.2
        run: |
          set -euxo pipefail
          sudo apt-get update
          . /etc/os-release
          sudo apt-get install -y \
            binutils \
            clang \
            curl \
            ca-certificates \
            git \
            gnupg2 \
            libc6-dev \
            libcurl4-openssl-dev \
            libedit2 \
            libicu-dev \
            libncurses-dev \
            libsqlite3-0 \
            libxml2-dev \
            pkg-config \
            tzdata \
            unzip \
            zip \
            zlib1g-dev
          case "${VERSION_ID:-}" in
            24.04)
              sudo apt-get install -y \
                libgcc-13-dev \
                libpython3-dev \
                libstdc++-13-dev \
                libz3-dev
              ;;
            *)
              sudo apt-get install -y \
                libgcc-11-dev \
                libpython3-dev \
                libstdc++-11-dev \
                libz3-dev \
                python3-lldb-13
              ;;
          esac
          SWIFT_VER=6.2.4
          case "${VERSION_ID:-}" in
            24.04) SWIFT_UBUNTU=ubuntu24.04; SWIFT_DL=ubuntu2404 ;;
            22.04) SWIFT_UBUNTU=ubuntu22.04; SWIFT_DL=ubuntu2204 ;;
            *) SWIFT_UBUNTU=ubuntu22.04; SWIFT_DL=ubuntu2204 ;;
          esac
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64) ;;
            aarch64|arm64) SWIFT_DL="${SWIFT_DL}-aarch64"; SWIFT_UBUNTU="${SWIFT_UBUNTU}-aarch64" ;;
            *) echo "unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          SWIFT_ROOT="swift-${SWIFT_VER}-RELEASE-${SWIFT_UBUNTU}"
          URL="https://download.swift.org/swift-${SWIFT_VER}-release/${SWIFT_DL}/swift-${SWIFT_VER}-RELEASE/${SWIFT_ROOT}.tar.gz"
          mkdir -p .ci-cache
          SWIFT_TAR=".ci-cache/swift-toolchain.tgz"
          if [ ! -s "$SWIFT_TAR" ]; then
            curl -fsSL "$URL" -o "$SWIFT_TAR"
          fi
          sudo tar -xzf "$SWIFT_TAR" -C /opt
          echo "/opt/${SWIFT_ROOT}/usr/bin" >> "${GITHUB_PATH}"
          swift --version
      # Split build vs test so CI logs are readable on Depot (`depot-ubuntu-latest`): a single
      # `swift test` emits a huge compile log first; in the GitHub Actions log view (used when CI
      # runs via Depot) output after linking can look missing because it is buried or truncated.
      # A dedicated "Run tests" step keeps pass/fail lines in a short, separate step.
      - name: Build (tests)
        run: swift build --build-tests -q -Xswiftc -warnings-as-errors
      - name: Run tests
        run: |
          set -euxo pipefail
          echo "Running swift test --skip-build (verbose)..."
          # Line-buffer stdout/stderr (Depot runner has no TTY; avoids losing output on crash/OOM).
          stdbuf -oL -eL env SWIFT_BACKTRACE=enable \
            swift test --skip-build --parallel -v --no-color-diagnostics

  docker:
    name: Docker Build and Push
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
    runs-on: depot-ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: depot/setup-action@v1
      - name: Set Tag
        id: vars
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "TAG=prod" >> $GITHUB_OUTPUT
          else
            echo "TAG=dev" >> $GITHUB_OUTPUT
          fi
      - uses: depot/build-push-action@v1
        with:
          context: .
          push: true
          project: ${{ secrets.DEPOT_PROJECT_ID }}
          token: ${{ secrets.DEPOT_TOKEN }}
          tags: |
            countablenewt/my-context-protocol:${{ steps.vars.outputs.TAG }}
            countablenewt/my-context-protocol:sha-${{ github.sha }}
