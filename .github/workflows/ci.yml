name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      deploy_mcp_gateway:
        description: Deploy the MCP gateway to Fly after CI checks
        required: true
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      mcp_gateway: ${{ steps.filter.outputs.mcp_gateway }}
      packages: ${{ steps.filter.outputs.packages }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        run: bash scripts/ci-detect-changes.sh

  ci:
    name: Test and build
    runs-on: macos-latest
    env:
      NEXT_PUBLIC_APP_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.7

      - name: Run CI script
        run: bash scripts/ci.sh

  deploy-mcp-gateway:
    name: Deploy MCP Gateway (Fly.io)
    needs: [changes, ci]
    if: |
      always() &&
      needs.ci.result == 'success' &&
      needs.changes.result == 'success' &&
      (needs.changes.outputs.mcp_gateway == 'true' || needs.changes.outputs.packages == 'true' || needs.changes.outputs.ci == 'true') &&
      (
        (github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'dev')) ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy_mcp_gateway)
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy MCP gateway to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_ORG: ${{ secrets.FLY_ORG }}
          FLY_MCP_GATEWAY_APP_DEV: ${{ secrets.FLY_MCP_GATEWAY_APP_DEV }}
          FLY_MCP_GATEWAY_APP_PROD: ${{ secrets.FLY_MCP_GATEWAY_APP_PROD }}
        run: bash scripts/fly-deploy-mcp-gateway.sh "${{ github.ref_name }}"
