# Runs the API only. Database and all runtime config come from `.env` (see root `.env.example`).
# No bundled Postgres — use Supabase or another host: set USE_SQLITE=0 and DATABASE_URL or
# SUPABASE_DB_URL in `.env` (optional DATABASE_INSECURE_TLS for pooler/TLS quirks).
#
# Build context: Dockerfile. Host `.env` is injected at runtime via env_file (not baked into the image).
services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
