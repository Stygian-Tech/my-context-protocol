# Deploy from services/mcp-gateway:
#   bash deploy.sh dev
# Or from the repo root:
#   bash scripts/fly-deploy-mcp-gateway.sh dev

app = 'my-context-protocol-dev-mcp-gateway'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  wait_timeout = '10m0s'

[env]
  PORT = '8080'
  APP_ENV = 'dev'
  HOST = '0.0.0.0'
  # Supabase / managed Postgres from Linux containers often fail default TLS verify (CERTIFICATE_VERIFY_FAILED).
  DATABASE_INSECURE_TLS = '1'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
